<!DOCTYPE html>
<html lang="fr">
<head>
  <script src="redirect.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVG — Galerie Performers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    h1    { color: #333; font-size: 28px; }
    .stats { color: #666; font-size: 14px; }

    .evg-home-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      margin-bottom: 16px;
      opacity: 0.9;
    }
    .evg-home-link:hover { opacity: 1; }
    .evg-home-link .evg-nav-name { color: #ffe066; }

    .evg-admin-select {
      background: transparent;
      color: #ffe066;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-bottom: 1px dashed rgba(255,224,102,.5);
      padding: 0 2px;
      cursor: pointer;
      max-width: 100px;
    }
    .evg-admin-select:focus  { outline: none; }
    .evg-admin-select:disabled { opacity: .5; cursor: default; }
    .evg-admin-select option { color: #333; }

    .controls { display: flex; gap: 15px; align-items: center; }

    .sort-btn {
      padding: 10px 20px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all .3s;
    }
    .sort-btn:hover, .sort-btn.active { background: #667eea; color: white; }

    .filter-sep { width: 1px; background: #ddd; align-self: stretch; margin: 0 5px; }

    .filter-btn {
      padding: 10px 16px;
      border: 2px solid #e0a020;
      background: white;
      color: #e0a020;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all .3s;
    }
    .filter-btn:hover, .filter-btn.active { background: #e0a020; color: white; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
      transition: transform .3s, box-shadow .3s;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 8px 12px rgba(0,0,0,.2); }

    /* ── Carrousel ── */
    .carousel {
      position: relative;
      width: 100%;
      height: 350px;
      background: #f5f5f5;
      overflow: hidden;
    }

    .carousel-image { width: 100%; height: 100%; object-fit: cover; display: none; }
    .carousel-image.active { display: block; }

    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,.5);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background .3s;
    }
    .carousel-nav:hover { background: rgba(0,0,0,.7); }
    .carousel-nav.prev { left: 10px; }
    .carousel-nav.next { right: 10px; }
    .carousel.has-multiple .carousel-nav { display: flex; }

    .carousel-dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 6px;
    }
    .carousel.has-multiple .carousel-dots { display: flex; }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.5);
      cursor: pointer;
      transition: background .3s;
    }
    .carousel-dot.active { background: white; }

    .image-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,.7);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Contenu carte ── */
    .card-content { padding: 20px; }
    .card-name { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 10px; text-transform: capitalize; }

    .card-score { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .score-label { font-size: 14px; color: #666; }
    .score-value { font-size: 20px; font-weight: 700; color: #667eea; }

    .score-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      border-radius: 4px;
      transition: width .5s ease;
    }

    .card-details { display: flex; gap: 15px; font-size: 13px; color: #666; }
    .detail-item  { display: flex; flex-direction: column; gap: 2px; }
    .detail-label { font-weight: 600; color: #999; font-size: 11px; text-transform: uppercase; }
    .detail-value { color: #333; font-weight: 600; }

    .no-image {
      width: 100%;
      height: 350px;
      background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="./" class="evg-home-link">🎉 EVG <span class="evg-nav-name">…</span></a>
    <div class="header">
      <div>
        <h1>Galerie Performers</h1>
        <div class="stats" id="stats">Chargement…</div>
      </div>
      <div class="controls">
        <button class="sort-btn active" onclick="sortBy('score', this)">Trier par Note</button>
        <button class="sort-btn"        onclick="sortBy('name',  this)">Trier par Nom</button>
        <div class="filter-sep"></div>
        <button class="filter-btn active" onclick="filterBy(null, this)">Toutes</button>
        <button class="filter-btn" onclick="filterBy('imageUrlHeta',     this)">Heta</button>
        <button class="filter-btn" onclick="filterBy('imageUrlDigamma',  this)">Digamma</button>
        <button class="filter-btn" onclick="filterBy('imageUrlBeta',     this)">Beta</button>
        <button class="filter-btn" onclick="filterBy('imageUrlUpsilon',  this)">Vixen</button>
      </div>
    </div>
    <div class="gallery" id="gallery"></div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
